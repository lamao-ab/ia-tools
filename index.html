<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outils IA Mini-Projets Master</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #252a36;
    --text: #e8eaf0;
    --text-muted: #7a8090;
    --header-bg: #1a1f2e;
    --accent: #00e5c8;
    --accent2: #a78bfa;
    --accent3: #ffd166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 36px 20px 60px;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    margin-bottom: 44px;
  }

  .hero-line {
    display: block;
    width: 160px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    margin: 0 auto 26px;
    border-radius: 2px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.7rem, 4.5vw, 3rem);
    letter-spacing: -0.02em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 55%, #ff4d6d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .hero-sub {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 0.78rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .hero-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.78rem;
    padding: 2px 11px;
    border-radius: 20px;
    letter-spacing: 0;
  }

  /* ── FILTER ROWS ── */
  .filter-section { margin-bottom: 16px; }

  .filter-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* group chips use accent2 */
  .chip.group-chip:hover  { border-color: var(--accent2); color: var(--accent2); }
  .chip.group-chip.active { background: var(--accent2); color: #000; border-color: var(--accent2); }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    max-width: 380px;
    margin-bottom: 22px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-wrap svg {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }

  /* ── STATS ── */
  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    flex: 1;
    min-width: 90px;
    text-align: center;
  }

  .stat-card .num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    display: block;
  }

  .stat-card .lbl {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── TABLE ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 0 50px rgba(0,229,200,0.04);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }

  thead tr { background: var(--header-bg); border-bottom: 2px solid var(--border); }

  thead th {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 14px 16px;
    text-align: left;
    white-space: nowrap;
    color: var(--text-muted);
  }

  thead th:nth-child(1) { color: var(--text-muted); }
  thead th:nth-child(2) { color: var(--accent); }
  thead th:nth-child(3) { color: var(--accent2); }
  thead th:nth-child(4) { color: var(--accent3); }
  thead th:nth-child(5) { color: #38bdf8; }
  thead th:nth-child(6) { color: #4ade80; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.14s; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.hidden { display: none; }

  td { padding: 12px 16px; vertical-align: middle; line-height: 1.5; }

  .n { color: var(--text-muted); font-size: 0.66rem; }

  .student {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    white-space: nowrap;
  }

  .tool {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    white-space: nowrap;
  }

  .cat-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.64rem;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
    border: 1px solid;
  }

  .project {
    font-size: 0.72rem;
    color: var(--text);
    max-width: 310px;
    line-height: 1.65;
    border-left: 2px solid;
    padding-left: 10px;
  }

  .gbadge {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.63rem;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .gA { background: rgba(0,229,200,0.13); color: var(--accent);  border: 1px solid rgba(0,229,200,0.28); }
  .gB { background: rgba(167,139,250,0.13); color: var(--accent2); border: 1px solid rgba(167,139,250,0.28); }

  .empty td {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-size: 0.82rem;
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <span class="hero-line"></span>
  <h1>Outils IA Mini-Projets Master</h1>
  <div class="hero-sub">
    Répertoire des outils IA pour étudiants en recherche
    <span class="hero-badge" id="badge-count">43</span>
  </div>
</div>

<!-- FILTERS : Groupe -->
<div class="filter-section">
  <div class="filter-label">Groupe</div>
  <div class="filter-row" id="group-filters">
    <button class="chip group-chip active" data-group="all">⬡ Tous</button>
    <button class="chip group-chip" data-group="A">Groupe A</button>
    <button class="chip group-chip" data-group="B">Groupe B</button>
  </div>
</div>

<!-- FILTERS : Catégorie -->
<div class="filter-section" style="margin-bottom:22px;">
  <div class="filter-label">Catégorie</div>
  <div class="filter-row" id="cat-filters"></div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
  </svg>
  <input type="text" id="search" placeholder="Rechercher un étudiant ou un outil...">
</div>

<!-- STATS -->
<div class="stats" id="stats"></div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>N°</th>
        <th>Nom &amp; Prénom</th>
        <th>Groupe</th>
        <th>Outil IA assigné</th>
        <th>Catégorie</th>
        <th>Idée de mini-projet</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const CATS = {
  "Revue de littérature":      { color: "#00e5c8", bg: "rgba(0,229,200,0.11)",   icon: "📚" },
  "Gestion des références":    { color: "#a78bfa", bg: "rgba(167,139,250,0.11)", icon: "🗂️" },
  "Grands modèles de langage": { color: "#38bdf8", bg: "rgba(56,189,248,0.11)",  icon: "🤖" },
  "Écriture & Paraphrase":     { color: "#ffd166", bg: "rgba(255,209,102,0.11)", icon: "✍️" },
  "Traduction":                { color: "#fb923c", bg: "rgba(251,146,60,0.11)",  icon: "🌐" },
  "Présentation visuelle":     { color: "#f472b6", bg: "rgba(244,114,182,0.11)", icon: "🎨" },
  "Génération d'images":       { color: "#e879f9", bg: "rgba(232,121,249,0.11)", icon: "🖼️" },
  "Transcription":             { color: "#34d399", bg: "rgba(52,211,153,0.11)",  icon: "🎙️" },
  "Lecture de PDF":            { color: "#ff4d6d", bg: "rgba(255,77,109,0.11)",  icon: "📄" },
  "Résumé de littérature":     { color: "#4ade80", bg: "rgba(74,222,128,0.11)",  icon: "🔬" },
  "Brainstorming":             { color: "#fbbf24", bg: "rgba(251,191,36,0.11)",  icon: "💡" },
  "Grammaire & Style":         { color: "#c084fc", bg: "rgba(192,132,252,0.11)", icon: "📝" },
  "Détection de plagiat":      { color: "#f87171", bg: "rgba(248,113,113,0.11)", icon: "🔍" },
};

const DATA = [
  { g:"A", name:"Boutaghrout Taoufik",   tool:"Semantic Scholar",               cat:"Revue de littérature",      proj:"Cartographier l'évolution d'un thème de recherche sur 10 ans à partir des citations." },
  { g:"A", name:"EL Maataouy Ilham",     tool:"Elicit",                         cat:"Revue de littérature",      proj:"Comparer automatiquement les méthodologies de 20 articles sur un sujet donné." },
  { g:"A", name:"EL Allaoui Mounaim",    tool:"Zotero",                         cat:"Gestion des références",    proj:"Gérer toutes les sources d'un mémoire de master et générer la bibliographie APA." },
  { g:"A", name:"Barrajjal Nabil",       tool:"ChatGPT",                        cat:"Grands modèles de langage", proj:"Structurer et améliorer un plan de mémoire en plusieurs itérations conversationnelles." },
  { g:"A", name:"Chahidi Rihab",         tool:"QuillBot",                       cat:"Écriture & Paraphrase",     proj:"Reformuler un résumé d'article en plusieurs niveaux de complexité pour différents publics." },
  { g:"A", name:"Abdellati Oussama",     tool:"DeepL Translator",               cat:"Traduction",                proj:"Traduire un article anglais en français et évaluer la qualité avec un expert bilingue." },
  { g:"A", name:"Elaouni Abdelkarim",    tool:"Canva",                          cat:"Présentation visuelle",     proj:"Concevoir un poster scientifique professionnel pour une conférence de master." },
  { g:"A", name:"Aidari Yassin",         tool:"Bing Image Creator",             cat:"Génération d'images",       proj:"Créer des illustrations conceptuelles pour un article de vulgarisation scientifique." },
  { g:"A", name:"Bouchlagham Chafir",    tool:"Otter.ai",                       cat:"Transcription",             proj:"Transcrire et analyser thématiquement 3 entretiens pour un mémoire qualitatif." },
  { g:"A", name:"Bounfour Ibrahim",      tool:"ChatPDF",                        cat:"Lecture de PDF",            proj:"Extraire les hypothèses et résultats clés de 10 articles en interrogeant chaque PDF." },
  { g:"A", name:"Aidone Fahd",           tool:"Scite.ai",                       cat:"Résumé de littérature",     proj:"Étudier la réception critique d'un article fondateur dans la littérature récente." },
  { g:"A", name:"EL Alami Souhaila",     tool:"NotebookLM",                     cat:"Présentation visuelle",     proj:"Générer automatiquement une présentation de 15 slides depuis un rapport PDF." },
  { g:"A", name:"Douiri Chahida",        tool:"Grammarly",                      cat:"Écriture & Paraphrase",     proj:"Analyser et améliorer le style d'un chapitre de mémoire avec rapport de score détaillé." },
  { g:"A", name:"Taibi Asmae",           tool:"Quetext",                        cat:"Détection de plagiat",      proj:"Vérifier l'originalité d'un mémoire et identifier les passages à reformuler." },
  { g:"A", name:"Akarach Amine",         tool:"Research Rabbit",                cat:"Revue de littérature",      proj:"Construire la carte de citations d'un auteur phare de sa discipline." },
  { g:"A", name:"Elmahraoui Hind",       tool:"Mendeley",                       cat:"Gestion des références",    proj:"Créer une bibliothèque partagée annotée pour un projet de groupe." },
  { g:"A", name:"Naciri Amine",          tool:"Claude",                         cat:"Grands modèles de langage", proj:"Analyser et synthétiser 5 articles scientifiques longs pour produire une revue critique." },
  { g:"A", name:"Kabbouri Abdelmounaim", tool:"Gamma.app",                      cat:"Présentation visuelle",     proj:"Transformer un résumé de mémoire en présentation visuelle en moins de 10 minutes." },
  { g:"A", name:"Agrour Chaimae",        tool:"SciSpace",                       cat:"Résumé de littérature",     proj:"Expliquer et comparer les méthodologies de 5 articles à des étudiants L3." },
  { g:"A", name:"Boutastas Mohamed",     tool:"ProWritingAid",                  cat:"Grammaire & Style",         proj:"Évaluer et améliorer le style académique d'un chapitre de mémoire." },
  { g:"A", name:"Belarbi Abdelmajid",    tool:"GPTZero",                        cat:"Détection de plagiat",      proj:"Étudier la détectabilité de textes IA reformulés par différents outils." },
  { g:"B", name:"TAGHLAOUI YOUSSEF",     tool:"Consensus",                      cat:"Revue de littérature",      proj:"Analyser la convergence/divergence de la littérature sur une hypothèse précise." },
  { g:"B", name:"AFASI SALMA",           tool:"Paperpile",                      cat:"Gestion des références",    proj:"Rédiger un article collaboratif Google Docs avec gestion des sources intégrée." },
  { g:"B", name:"MAHDAOUI ALI",          tool:"Google Gemini",                  cat:"Grands modèles de langage", proj:"Utiliser le mode multimodal pour analyser des graphiques d'articles scientifiques." },
  { g:"B", name:"ZAGHDOUD NABILA",       tool:"Hemingway Editor",               cat:"Écriture & Paraphrase",     proj:"Réécrire une introduction de mémoire pour atteindre un score de lisibilité optimal." },
  { g:"B", name:"EL HAGOUI AYYOUB",      tool:"Google Translate",               cat:"Traduction",                proj:"Comparer les traductions d'un texte spécialisé par 3 outils différents." },
  { g:"B", name:"HAOUHAOU ISSAME",       tool:"Leonardo.ai",                    cat:"Génération d'images",       proj:"Produire une série visuelle cohérente pour illustrer un concept scientifique abstrait." },
  { g:"B", name:"BOUYAHYI MOHAMMED",     tool:"Fireflies.ai",                   cat:"Transcription",             proj:"Analyser les dynamiques de prise de parole dans des entretiens de recherche." },
  { g:"B", name:"OU SOUH MOHAMED",       tool:"Scholarcy",                      cat:"Lecture de PDF",            proj:"Générer des fiches de révision à partir d'une bibliographie de mémoire." },
  { g:"B", name:"AABID ELHOUSSAINE",     tool:"Notion AI",                      cat:"Brainstorming",             proj:"Créer un wiki de projet de recherche avec génération automatique de contenu." },
  { g:"B", name:"BOUCHAYB MOHAMED",      tool:"Wordtune",                       cat:"Écriture & Paraphrase",     proj:"Produire 3 versions différentes (formel, neutre, accessible) d'un même paragraphe." },
  { g:"B", name:"AANOUI FATIMA",         tool:"Reverso Context",                cat:"Traduction",                proj:"Étudier les variations de terminologie scientifique dans des corpus bilingues." },
  { g:"B", name:"JALAL KHALID",          tool:"SlidesAI",                       cat:"Présentation visuelle",     proj:"Générer automatiquement une présentation de 15 slides depuis un rapport PDF." },
  { g:"B", name:"BOUDLA RIDOUAN",        tool:"Ideogram",                       cat:"Génération d'images",       proj:"Créer des infographies visuelles avec texte lisible pour une présentation académique." },
  { g:"B", name:"OULHAJ HASSAN",         tool:"Microsoft Teams (transcription)", cat:"Transcription",            proj:"Analyser les thèmes récurrents dans les transcriptions de réunions de projet." },
  { g:"B", name:"AFENICH MONAIM",        tool:"Humata AI",                      cat:"Lecture de PDF",            proj:"Comparer les résultats de plusieurs études sur un même objet de recherche." },
  { g:"B", name:"EL KAMOUNI MOHAMMED",   tool:"Explain Paper",                  cat:"Résumé de littérature",     proj:"Rendre accessible un article très technique à un public non-spécialiste." },
  { g:"B", name:"DIOUANI OUMAIMA",       tool:"MindMeister",                    cat:"Brainstorming",             proj:"Structurer visuellement le cadre théorique d'un mémoire en carte mentale." },
  { g:"B", name:"AAZZAB FATIMA",         tool:"Language Tool",                  cat:"Écriture & Paraphrase",     proj:"Corriger un article académique en français et en anglais et comparer les erreurs." },
  { g:"B", name:"LOUCHERI CHAHRAZAD",    tool:"Scribbr",                        cat:"Détection de plagiat",      proj:"Analyser l'impact de la paraphrase IA sur les scores de plagiat." },
  { g:"B", name:"EL MAHDAOUI WALID",     tool:"Microsoft Copilot",              cat:"Grands modèles de langage", proj:"Automatiser la rédaction de rapports Word et la mise en forme de tableaux Excel." },
  { g:"B", name:"TAIBI CHAMA",           tool:"Google Scholar",                 cat:"Revue de littérature",      proj:"Créer un dashboard de veille scientifique sur une thématique de mémoire." },
  { g:"B", name:"EL YAAKOUBI NISRIA",    tool:"Whimsical",                      cat:"Brainstorming",             proj:"Modéliser le processus méthodologique d'une recherche en flowchart interactif." },
];

// ── Build category filter buttons ──────────────────────────────────────────
const catContainer = document.getElementById('cat-filters');
const catNames = Object.keys(CATS);

const allCatBtn = document.createElement('button');
allCatBtn.className = 'chip active';
allCatBtn.dataset.cat = 'all';
allCatBtn.textContent = '⬡ Tous';
catContainer.appendChild(allCatBtn);

catNames.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.dataset.cat = cat;
  btn.textContent = CATS[cat].icon + ' ' + cat;
  catContainer.appendChild(btn);
});

// ── State ──────────────────────────────────────────────────────────────────
let activeGroup = 'all';
let activeCat   = 'all';

const tbody      = document.getElementById('tbody');
const statsEl    = document.getElementById('stats');
const searchEl   = document.getElementById('search');
const badgeCount = document.getElementById('badge-count');

// ── Filter chips events ────────────────────────────────────────────────────
document.getElementById('group-filters').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('#group-filters .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeGroup = btn.dataset.group;
  render();
});

catContainer.addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('#cat-filters .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  render();
});

searchEl.addEventListener('input', render);

// ── Helpers ────────────────────────────────────────────────────────────────
function getFiltered() {
  const q = searchEl.value.toLowerCase();
  return DATA.filter(s => {
    if (activeGroup !== 'all' && s.g !== activeGroup) return false;
    if (activeCat   !== 'all' && s.cat !== activeCat)  return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.tool.toLowerCase().includes(q) && !s.cat.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderStats(filtered) {
  statsEl.innerHTML = '';
  [
    { num: filtered.length,                               lbl: 'Étudiants',  color: '#00e5c8' },
    { num: filtered.filter(s => s.g === 'A').length,      lbl: 'Groupe A',   color: '#00e5c8' },
    { num: filtered.filter(s => s.g === 'B').length,      lbl: 'Groupe B',   color: '#a78bfa' },
    { num: new Set(filtered.map(s => s.cat)).size,        lbl: 'Catégories', color: '#ffd166' },
  ].forEach(({ num, lbl, color }) => {
    const c = document.createElement('div');
    c.className = 'stat-card';
    c.innerHTML = `<span class="num" style="color:${color}">${num}</span><span class="lbl">${lbl}</span>`;
    statsEl.appendChild(c);
  });
}

function render() {
  const filtered = getFiltered();
  badgeCount.textContent = filtered.length;
  renderStats(filtered);
  tbody.innerHTML = '';

  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty"><td colspan="6">Aucun résultat pour cette sélection.</td></tr>';
    return;
  }

  filtered.forEach((s, i) => {
    const cat = CATS[s.cat];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="n">${String(i+1).padStart(2,'0')}</td>
      <td><span class="student">${s.name}</span></td>
      <td><span class="gbadge g${s.g}">Groupe ${s.g}</span></td>
      <td><span class="tool" style="color:${cat.color}">${s.tool}</span></td>
      <td><span class="cat-pill" style="color:${cat.color};border-color:${cat.color};background:${cat.bg}">${cat.icon} ${s.cat}</span></td>
      <td><span class="project" style="border-color:${cat.color}">${s.proj}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

render();
</script>
</body>
</html>
